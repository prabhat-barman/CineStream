name: Distribute Android beta

# Push to main → build release APK → upload to Firebase App Distribution.
# Skipped for docs-only / iOS-only / CI-only changes to save build time.
# Can also be triggered manually from the Actions tab.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'ios/**'
      - '.github/**'
  workflow_dispatch:

# Never run two Android distribute jobs in parallel — Firebase would just
# race on the same release, wasting build minutes. Newer pushes wait.
concurrency:
  group: android-distribute
  cancel-in-progress: false

jobs:
  distribute:
    name: Build APK and upload to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install npm dependencies
        run: npm ci --no-audit --loglevel=error

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Generate release notes from git
        run: |
          {
            echo "CineStream — automated build from main"
            echo ""
            echo "Latest commit:"
            git log -1 --pretty=format:"  %h %s%n%n%b"
          } > "$RUNNER_TEMP/release-notes.txt"
          echo "----- release notes -----"
          cat "$RUNNER_TEMP/release-notes.txt"
          echo "-------------------------"

      - name: Distribute to Firebase App Distribution
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Missing FIREBASE_SERVICE_ACCOUNT secret. See DISTRIBUTION.md."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"

          # Diagnostic: print which service account + project the secret
          # points at. These identifiers are NOT secret (they're visible on
          # the GCP IAM page). If distribute fails with 403, this tells us
          # exactly which principal needs "Firebase App Distribution Admin".
          echo "----- service account identity -----"
          node -e '
            const sa = require(process.env.GOOGLE_APPLICATION_CREDENTIALS);
            console.log("client_email :", sa.client_email);
            console.log("project_id   :", sa.project_id);
            console.log("type         :", sa.type);
          '
          echo "------------------------------------"

          npx --yes firebase-tools appdistribution:distribute \
            android/app/build/outputs/apk/release/app-release.apk \
            --app 1:55460051377:android:44de0ae4a092b408a6e590 \
            --release-notes-file "$RUNNER_TEMP/release-notes.txt" \
            --groups testers

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
