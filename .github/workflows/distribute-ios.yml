name: Distribute iOS beta

# Push to main → build signed iOS IPA → upload to Firebase App Distribution
# (or TestFlight if lane=testflight is dispatched). Runs on macOS since Xcode
# is required. Skipped for docs-only / android-only / CI-only changes.
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   FIREBASE_SERVICE_ACCOUNT              — same JSON key as Android workflow
#   FIREBASE_IOS_APP_ID                   — "1:...:ios:..." from Firebase console
#   IOS_DIST_CERT_P12_BASE64              — `base64 -i AppleDistribution.p12`
#   IOS_DIST_CERT_PASSWORD                — password used when exporting the .p12
#   IOS_ADHOC_PROVISION_PROFILE_BASE64    — `base64 -i CineStream_AdHoc.mobileprovision`
#   IOS_APPSTORE_PROVISION_PROFILE_BASE64 — required only for the testflight lane
#   IOS_KEYCHAIN_PASSWORD                 — any random string (unlocks the temp keychain)
#   APP_STORE_CONNECT_API_KEY_ID          — required only for the testflight lane
#   APP_STORE_CONNECT_API_ISSUER_ID       — required only for the testflight lane
#   APP_STORE_CONNECT_API_KEY_CONTENT_BASE64 — `base64 -i AuthKey_XXXX.p8`
#
# See CineStream/DISTRIBUTION.md for the full walkthrough.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'android/**'
      - '.github/workflows/distribute-android.yml'
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane to run'
        required: true
        default: 'simulator'
        type: choice
        options:
          - simulator
          - beta
          - testflight

concurrency:
  group: ios-distribute
  cancel-in-progress: false

jobs:
  distribute:
    name: Build IPA and upload
    # macos-15 image ships Xcode 16.x, which React Native 0.86 requires.
    # macos-14 images cap out at Xcode 15.4, so `pod install` refuses to run.
    runs-on: macos-15
    timeout-minutes: 60
    env:
      # Default push builds go through the `simulator` lane because it doesn't
      # need Apple Developer signing secrets. Once you enrol in Apple Developer
      # Program and add the IOS_DIST_CERT_* / IOS_ADHOC_PROVISION_PROFILE_*
      # secrets, flip this default to 'beta' to get real-device builds on every
      # push. `testflight` is intentionally kept manual-dispatch only.
      LANE: ${{ github.event.inputs.lane || 'simulator' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: '.'

      - name: Select Xcode
        # Pick the newest Xcode 16.x available on the runner. `macos-15` ships
        # 16.1 – 16.4 depending on image refresh date; fall back to whatever
        # /Applications/Xcode.app symlinks to as a last resort.
        run: |
          set -eu
          for candidate in Xcode_16.4 Xcode_16.3 Xcode_16.2 Xcode_16.1 Xcode; do
            path="/Applications/${candidate}.app"
            if [ -d "$path" ]; then
              echo "Selecting $path"
              sudo xcode-select -s "$path"
              /usr/bin/xcodebuild -version
              exit 0
            fi
          done
          echo "::error::No Xcode 16.x found on runner."
          ls /Applications | grep -i Xcode || true
          exit 1

      - name: Install npm dependencies
        run: npm ci --no-audit --loglevel=error

      - name: Install CocoaPods
        working-directory: ios
        run: bundle exec pod install --repo-update

      - name: Generate release notes from git
        run: |
          {
            echo "CineStream iOS — automated build from main"
            echo ""
            echo "Latest commit:"
            git log -1 --pretty=format:"  %h %s%n%n%b"
          } > RELEASE_NOTES.md
          echo "----- release notes -----"
          cat RELEASE_NOTES.md
          echo "-------------------------"

      - name: Preflight required secrets
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_IOS_APP_ID: ${{ secrets.FIREBASE_IOS_APP_ID }}
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_ADHOC_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_ADHOC_PROVISION_PROFILE_BASE64 }}
          IOS_APPSTORE_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROVISION_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT_BASE64 }}
        run: |
          set -eu
          missing=()
          check() {
            local name="$1"; local value="$2"
            if [ -z "$value" ]; then missing+=("$name"); fi
          }
          case "$LANE" in
            beta)
              check FIREBASE_SERVICE_ACCOUNT               "$FIREBASE_SERVICE_ACCOUNT"
              check FIREBASE_IOS_APP_ID                    "$FIREBASE_IOS_APP_ID"
              check IOS_DIST_CERT_P12_BASE64               "$IOS_DIST_CERT_P12_BASE64"
              check IOS_DIST_CERT_PASSWORD                 "$IOS_DIST_CERT_PASSWORD"
              check IOS_ADHOC_PROVISION_PROFILE_BASE64     "$IOS_ADHOC_PROVISION_PROFILE_BASE64"
              ;;
            simulator)
              # The simulator lane produces an unsigned .app.zip that Firebase
              # App Distribution will not accept (only signed IPAs are allowed).
              # We distribute it as a GitHub Actions build artifact instead —
              # no secrets required.
              echo "simulator lane distributes via GitHub Actions artifact — no secrets required."
              ;;
            testflight)
              check IOS_DIST_CERT_P12_BASE64               "$IOS_DIST_CERT_P12_BASE64"
              check IOS_DIST_CERT_PASSWORD                 "$IOS_DIST_CERT_PASSWORD"
              check IOS_APPSTORE_PROVISION_PROFILE_BASE64  "$IOS_APPSTORE_PROVISION_PROFILE_BASE64"
              check APP_STORE_CONNECT_API_KEY_ID           "$APP_STORE_CONNECT_API_KEY_ID"
              check APP_STORE_CONNECT_API_ISSUER_ID        "$APP_STORE_CONNECT_API_ISSUER_ID"
              check APP_STORE_CONNECT_API_KEY_CONTENT_BASE64 "$APP_STORE_CONNECT_API_KEY_CONTENT_BASE64"
              ;;
            *)
              echo "::error::Unknown lane: $LANE"
              exit 1
              ;;
          esac
          if [ ${#missing[@]} -gt 0 ]; then
            printf '::error::Missing required secrets for lane "%s":\n' "$LANE"
            printf '  - %s\n' "${missing[@]}"
            echo "See CineStream/DISTRIBUTION.md for setup instructions."
            exit 1
          fi
          echo "All required secrets for lane '$LANE' are present."

      - name: Write Firebase service account JSON
        # Only the `beta` lane uploads to Firebase App Distribution; `simulator`
        # ships via GitHub artifact and `testflight` ships via App Store Connect.
        if: env.LANE == 'beta'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Run fastlane
        working-directory: ios
        env:
          FASTLANE_HIDE_CHANGELOG: 1
          FASTLANE_SKIP_UPDATE_CHECK: 1
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
          CI: 'true'
          FIREBASE_IOS_APP_ID: ${{ secrets.FIREBASE_IOS_APP_ID }}
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_ADHOC_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_ADHOC_PROVISION_PROFILE_BASE64 }}
          IOS_APPSTORE_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROVISION_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT_BASE64 }}
        run: bundle exec fastlane ios "$LANE"

      - name: Upload build artifacts
        # For the simulator lane this artifact IS the distribution channel — Mac
        # testers download CineStream-simulator.zip from the run summary and
        # install into their booted iOS Simulator. For beta/testflight it's
        # kept for debugging (Firebase / App Store Connect already got the IPA).
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ env.LANE }}-${{ github.sha }}
          path: |
            ios/fastlane/build/**
            ios/fastlane/*.log
          retention-days: 30
          if-no-files-found: warn

      - name: Print simulator-install instructions
        if: env.LANE == 'simulator' && success()
        run: |
          cat <<'INSTRUCTIONS'
          =========================================================
           iOS Simulator build ready for testers (Mac only)
          =========================================================
           1. Open this run on GitHub, scroll to "Artifacts".
           2. Download "ios-simulator-${{ github.sha }}".
           3. Unzip; you get CineStream-simulator.zip → unzip that too.
           4. Boot a simulator:  open -a Simulator
           5. Install & launch:
              xcrun simctl install booted CineStream.app
              xcrun simctl launch  booted com.cinestream
          =========================================================
          INSTRUCTIONS
